name: CSV Row Realigner 浏览器版购买咨询（USD 9）
description: 购买离线浏览器工具；公开 issue 只提交脱敏结构和合成示例。
title: "[CSV Row Realigner Web] "
labels:
  - purchase-inquiry
body:
  - type: markdown
    attributes:
      value: |
        USD 9 / RMB 59，包含离线浏览器工具、源码、7 项测试、错列前后示例和 JSON 审计。提交本表不会产生付款义务；双方必须先确认合法付款方式、费用和交付范围。请勿公开上传真实 CSV、客户信息、凭据或付款信息。
  - type: dropdown
    id: operating-system
    attributes:
      label: 使用系统
      options:
        - Windows
        - macOS
        - Linux
        - 其他现代浏览器环境
    validations:
      required: true
  - type: input
    id: columns
    attributes:
      label: 脱敏字段名称
      placeholder: order_id, description, amount, date
    validations:
      required: true
  - type: input
    id: repair-column
    attributes:
      label: 允许包含多余逗号的文本列
      placeholder: description
    validations:
      required: true
  - type: textarea
    id: synthetic-example
    attributes:
      label: 完全虚构的错列示例
      description: 只使用虚构值展示一行错误输入和期望结果，不要粘贴业务记录。
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 我理解本工具只处理一个已知文本列中的多余逗号，短行和格式损坏行会失败关闭。
          required: true
        - label: 我理解公开咨询不代表已付款，付款和交付必须由双方另行确认。
          required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我没有提交真实客户、订单、地址、电话、邮箱、凭据、私有链接或付款信息。
          required: true
