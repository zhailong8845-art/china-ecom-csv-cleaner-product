name: CSV 错列人工核验修复服务（USD 5）
description: 一份最多500行CSV的人工核验修复；公开issue只提交脱敏结构和合成示例。
title: "[USD 5 CSV Repair] "
labels:
  - purchase-inquiry
body:
  - type: markdown
    attributes:
      value: |
        USD 5 / RMB 39：人工核验修复一份最多 500 行的 CSV，处理一个确认后的自由文本错列字段，交付 Excel 可读 CSV 和 JSON 记录数审计。浏览器自助工具和源码永久免费。提交本表不会产生付款义务；双方必须先确认合法付款方式、费用、私密文件传输方式和交付范围。请勿公开上传真实 CSV、客户信息、凭据或付款信息。
  - type: input
    id: columns
    attributes:
      label: 脱敏字段名称
      placeholder: order_id, description, amount, date
    validations:
      required: true
  - type: input
    id: repair-column
    attributes:
      label: 允许包含多余逗号的文本列
      placeholder: description
    validations:
      required: true
  - type: textarea
    id: synthetic-example
    attributes:
      label: 完全虚构的错列示例
      description: 只使用虚构值展示一行错误输入和期望结果，不要粘贴业务记录。
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      options:
        - label: 我理解首批服务只处理一份最多 500 行 CSV 和一个已确认的多余逗号文本列；其他损坏需重新确认范围。
          required: true
        - label: 我理解公开咨询不代表已付款，付款和交付必须由双方另行确认。
          required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: 隐私确认
      options:
        - label: 我没有提交真实客户、订单、地址、电话、邮箱、凭据、私有链接或付款信息。
          required: true
