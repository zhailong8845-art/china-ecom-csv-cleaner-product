name: GitHub 悬赏候选预检报告
description: 人民币 39 元 / USD 5；最多 20 个公开 issue，交付证据、排除理由和候选评分
title: "[悬赏预检] 候选批次名称"
labels:
  - service-order
body:
  - type: markdown
    attributes:
      value: |
        交付：最多 20 个公开 GitHub issue 的逐项预检、排除原因、前三候选评分和一次复检。公开 Issue 不得提交 token、私有仓库、账号、身份或付款资料。广告金额不等于托管或付款证明。
  - type: textarea
    id: urls
    attributes:
      label: 公开 GitHub issue URL
      description: 每行一个，最多 20 个；只能提交你有权要求核验的公开链接
      placeholder: https://github.com/owner/repo/issues/123
    validations:
      required: true
  - type: dropdown
    id: output
    attributes:
      label: 报告格式
      options:
        - Markdown
        - JSON
        - Markdown + JSON
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: 权限与安全确认
      options:
        - label: 所有链接均为公开 GitHub issue，不包含凭据、秘密、身份或付款信息
          required: true
        - label: 我理解报告只做预检，不保证任务验收或付款
          required: true
